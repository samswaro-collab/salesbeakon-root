<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://app.salesbeakon.com/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BEAKON — Redirecting…</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0a0a1a;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;
      flex-direction:column;gap:20px;
    }
    .logo{font-size:2.2rem;font-weight:800;letter-spacing:3px;color:#e31837}
    .sub{font-size:1rem;color:#888;letter-spacing:1px}
    .dot{
      width:48px;height:48px;border:4px solid #e31837;
      border-top-color:transparent;border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    a{color:#e31837;text-decoration:none;font-size:.9rem}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="logo">BEAKON</div>
  <div class="sub">Sales Intelligence Platform</div>
  <div class="dot"></div>
  <p style="color:#666;font-size:.85rem">Redirecting to app.salesbeakon.com…</p>
  <a href="https://app.salesbeakon.com/">Click here if not redirected</a>
  <script>window.location.replace("https://app.salesbeakon.com/");</script>
</body>
</html>
